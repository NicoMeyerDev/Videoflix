<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm your email</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f4f4f4; font-family: Arial, sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background-color: #f4f4f4; padding: 40px 0;">
        <tr>
            <td align="center">
                <table width="600" cellpadding="0" cellspacing="0" style="background-color: #ffffff; border-radius: 8px; overflow: hidden;">
                    <tr>
                        <td align="center" style="padding: 40px 0 20px 0;">
                            <span style="color: #4f46e5; font-size: 28px; font-weight: bold;">&#9658; VIDEOFLIX</span>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding: 20px 40px 40px 40px; color: #333333;">
                            <p>Dear {{ user_email }},</p>
                            <p>Thank you for registering with <strong>Videoflix</strong>. To complete your registration and verify your email address, please click the link below:</p>
                            <p style="text-align: center; margin: 30px 0;">
                                <a href="{{ link }}" style="background-color: #4f46e5; color: #ffffff; padding: 14px 28px; text-decoration: none; border-radius: 6px; font-weight: bold; display: inline-block;">Activate account</a>
                            </p>
                            <p>If you did not create an account with us, please disregard this email.</p>
                            <p>Best regards,<br>Your Videoflix Team.</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
